<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in - Google Accounts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f0f2f5; /* Light gray background */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
      box-sizing: border-box;
    }
    .login-box {
      background: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .google-logo {
      height: 48px; /* Standard Google logo size */
      width: auto;
      margin-bottom: 1.5rem;
    }
    .input-field {
      border: 1px solid #dadce0;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      width: 100%;
      margin-bottom: 1rem;
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .input-field:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 1px #1a73e8;
    }
    .sign-in-button {
      background-color: #1a73e8; /* Google Blue */
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      transition: background-color 0.2s ease;
      width: 100%;
    }
    .sign-in-button:hover {
      background-color: #1764cc;
    }
    .warning-text {
      color: #ef4444; /* Tailwind red-500 */
      font-weight: 600;
      margin-top: 1.5rem;
    }

    /* Local Feedback Modal Styles */
    .local-feedback-modal-overlay {
      display: none; /* Hidden by default */
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7); /* Darker overlay for strong feedback */
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }
    .local-feedback-modal-overlay.show {
      display: flex;
      opacity: 1;
    }
    .local-feedback-modal-content {
      background: #fff;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      max-width: 90%;
      width: 450px;
      text-align: center;
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
    }
    .local-feedback-modal-overlay.show .local-feedback-modal-content {
      transform: translateY(0);
      opacity: 1;
    }
    .local-feedback-modal-content .title-phish {
      color: #dc2626; /* Tailwind red-600 */
    }
    .local-feedback-modal-content .title-good {
      color: #10b981; /* Tailwind green-600 */
    }
  </style>
</head>
<body>

  <main class="login-box">
    <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo" class="google-logo mx-auto">
    <h1 class="text-2xl font-semibold text-gray-800 mb-2">Sign in</h1>
    <p class="text-gray-600 mb-6">to continue to Google Drive</p>

    <input type="email" id="gdrive-email" placeholder="Email or phone" class="input-field" aria-label="Email or phone input">
    <input type="password" id="gdrive-password" placeholder="Password" class="input-field" aria-label="Password input">

    <button onclick="submitGdrive()" class="sign-in-button">Sign In</button>

    <p class="warning-text">🚨 This is a phishing simulation. Do not enter real credentials!</p>
  </main>

  <!-- Local Feedback Modal -->
  <div id="local-feedback-modal-overlay" class="local-feedback-modal-overlay">
    <div class="local-feedback-modal-content">
      <h3 id="local-modal-title" class="text-2xl font-bold mb-4"></h3>
      <p id="local-modal-message" class="text-gray-700 mb-6"></p>
      <button onclick="handleLocalModalClose()"
              class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold text-lg hover:bg-blue-700 transition duration-300 shadow-lg">
        Got It!
      </button>
    </div>
  </div>

  <script>
    let simulationId = ''; // To store the ID passed from parent
    let currentFeedbackData = null; // Store feedback data before showing local modal

    // Function to send feedback to the parent (simulate.html) via localStorage
    function sendFeedbackToParentAndClose(title, message, isPhish, simId) {
      localStorage.setItem('simulationFeedback', JSON.stringify({ title, message, isPhish, simulationId: simId }));
      setTimeout(() => {
        window.close(); // Close this tab
      }, 50000); // Short delay for localStorage to save
    }

    // Function to show the local feedback modal
    function showLocalFeedbackModal(title, message, isPhish) {
      const modalOverlay = document.getElementById('local-feedback-modal-overlay');
      const modalTitle = document.getElementById('local-modal-title');
      const modalMessage = document.getElementById('local-modal-message');

      modalTitle.textContent = title;
      modalMessage.textContent = message;

      if (isPhish) {
        modalTitle.classList.remove('title-good');
        modalTitle.classList.add('title-phish');
      } else {
        modalTitle.classList.remove('title-phish');
        modalTitle.classList.add('title-good');
      }

      modalOverlay.classList.add('show');
    }

    // Handle closing the local modal and then sending feedback to parent
    function handleLocalModalClose() {
      document.getElementById('local-feedback-modal-overlay').classList.remove('show');
      if (currentFeedbackData) {
          sendFeedbackToParentAndClose(
              currentFeedbackData.title,
              currentFeedbackData.message,
              currentFeedbackData.isPhish,
              currentFeedbackData.simulationId
          );
      }
    }

    window.onload = function() {
        // Get simulationId from localStorage (set by simulate.html)
        simulationId = localStorage.getItem('currentSimulationId') || 'gdrive-phishing'; // Fallback ID
    };

    function submitGdrive() {
      const email = document.getElementById('gdrive-email').value;
      const password = document.getElementById('gdrive-password').value;

      let title;
      let message;
      let isPhish;
      let simId;

      if (email || password) {
        title = '🚨 Warning: Phishing Scam!';
        message = 'This was a fake Google Drive login page. Entering your credentials here would have compromised your account. Always verify file share links directly in Google Drive and check the sender’s email. Never enter real credentials on suspicious pages!';
        isPhish = true;
        simId = simulationId; // Use the original simulation ID
      } else {
        title = 'Heads Up!';
        message = 'Please enter an email or password to simulate the scam\'s attempt to collect credentials. Even engaging with such a page is risky.';
        isPhish = false; // Not a phishing warning itself, but a prompt for user action
        simId = simulationId + '-no-input'; // Distinct ID for no input
      }

      currentFeedbackData = { title, message, isPhish, simulationId: simId };
      showLocalFeedbackModal(title, message, isPhish);
    }
  </script>
</body>
</html>
